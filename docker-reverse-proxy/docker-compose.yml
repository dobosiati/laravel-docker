services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:latest

    container_name: global_caddy

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    environment:
      CADDY_INGRESS_NETWORKS: web

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    external: true
