services:
  app:
    image: dobosiati/php84-laravel:latest

    container_name: ${DOCKER_PREFIX}_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www

    depends_on:
      - mysql
      - redis
      - typesense

    ports:
      - "${VITE_PORT:-5173}:${VITE_PORT:-5173}"

    networks:
      - internal

  nginx:
    image: nginx:alpine

    container_name: ${DOCKER_PREFIX}_nginx

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    labels:
      caddy: ${APP_URL}
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 80}}"

    depends_on:
      - app

    networks:
      - web
      - internal

  horizon:
    image: dobosiati/php84-laravel:latest

    container_name: ${DOCKER_PREFIX}_horizon

    restart: unless-stopped

    command: php artisan horizon

    volumes:
      - ./:/var/www

    working_dir: /var/www

    depends_on:
      - redis
      - mysql
      - typesense

    networks:
      - internal

  mysql:
    image: mysql:8.4

    container_name: ${DOCKER_PREFIX}_mysql

    restart: unless-stopped

    ports:
      - "${DB_PORT:-3306}:3306"

    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - internal

  redis:
    image: redis:8-alpine

    container_name: ${DOCKER_PREFIX}_redis

    restart: unless-stopped

    networks:
      - internal

  mailhog:
    image: mailhog/mailhog

    container_name: ${DOCKER_PREFIX}_mailhog

    restart: unless-stopped

    labels:
      caddy: ${MAIL_URL}
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 8025}}"

    networks:
      - web
      - internal

  typesense:
    image: typesense/typesense:27.1

    container_name: ${DOCKER_PREFIX}_typesense

    restart: unless-stopped

    ports:
      - "${TYPESENSE_PORT:-8108}:8108"

    volumes:
      - typesense_data:/data

    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_HOST: ${TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: ${TYPESENSE_PORT:-8108}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-xyz}
      TYPESENSE_ENABLE_CORS: "true"

    networks:
      - internal

volumes:
  mysql_data:
  typesense_data:

networks:
  web:
    external: true

  internal: