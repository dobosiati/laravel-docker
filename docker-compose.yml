services:
  app:
    image: dobosiati/php84-laravel:latest

    container_name: ${DOCKER_PREFIX}_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www

    depends_on:
      - mysql
      - redis

    networks:
      - internal
    
  nginx:
    image: nginx:alpine

    container_name: ${DOCKER_PREFIX}_nginx

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    labels:
      caddy: ${APP_URL}
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 80}}"

    depends_on:
      - app

    networks:
      - web
      - internal

  mysql:
    image: mysql:8.4

    container_name: ${DOCKER_PREFIX}_mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - internal

  redis:
    image: redis:8-alpine

    container_name: ${DOCKER_PREFIX}_redis

    restart: unless-stopped

    networks:
      - internal

  mailhog:
    image: mailhog/mailhog

    container_name: ${DOCKER_PREFIX}_mailhog

    restart: unless-stopped

    labels:
      caddy: ${MAIL_URL}
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 8025}}"

    networks:
      - web
      - internal

volumes:
  mysql_data:

networks:
  web:
    external: true

  internal: